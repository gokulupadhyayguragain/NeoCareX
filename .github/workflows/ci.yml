# CI is intentionally simple here:
# validate Flutter, run tests, build a web bundle, and verify the Docker path
# that non-prod EC2 still uses.
name: Patient App CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.3
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib test

      - name: Run tests
        run: flutter test test

      - name: Build dev web bundle
        # Build once in CI to catch broken env defines or web-only regressions early.
        run: flutter build web --release --dart-define-from-file=env/dev_env.json

      - name: Validate Docker image build
        # Non-prod EC2 still uses Docker/Nginx, so keep this path validated in CI too.
        run: docker build --build-arg ENV=env/dev_env.json --build-arg NGINX_FILE=default_ec2.conf -t patient-app:ci .
