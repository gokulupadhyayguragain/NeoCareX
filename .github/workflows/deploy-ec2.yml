# Non-prod deployment workflow.
# Branches are mapped to GitHub Environments, and each environment should point
# to the correct AWS region through its own EC2 host and domain variables.
name: Deploy Patient App to EC2

on:
  push:
    branches:
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target EC2 environment
        required: true
        type: choice
        options:
          - dev
          - staging

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      github_environment: ${{ steps.resolve.outputs.github_environment }}
      dart_define_file: ${{ steps.resolve.outputs.dart_define_file }}

    steps:
      - name: Resolve target environment
        # Keep the branch-to-environment mapping explicit and easy to debug.
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            target_env="$INPUT_ENVIRONMENT"
          elif [ "$REF_NAME" = "develop" ]; then
            target_env="dev"
          elif [ "$REF_NAME" = "staging" ]; then
            target_env="staging"
          else
            echo "No deployment mapping exists for branch: $REF_NAME" >&2
            exit 1
          fi

          case "$target_env" in
            dev)
              define_file="env/dev_env.json"
              ;;
            staging)
              define_file="env/prod_dev_env.json"
              ;;
            *)
              echo "Unsupported environment: $target_env" >&2
              exit 1
              ;;
          esac

          echo "github_environment=$target_env" >> "$GITHUB_OUTPUT"
          echo "dart_define_file=$define_file" >> "$GITHUB_OUTPUT"

  build_image:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.github_environment }}
      url: ${{ vars.PATIENT_APP_URL }}
    concurrency:
      group: patient-app-ec2-${{ needs.prepare.outputs.github_environment }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Render Nginx config for image build
        env:
          PATIENT_APP_DOMAIN: ${{ vars.PATIENT_APP_DOMAIN }}
          PATIENT_APP_SERVER_NAME: ${{ vars.PATIENT_APP_SERVER_NAME }}
        run: |
          PATIENT_APP_DOMAIN="$PATIENT_APP_DOMAIN" \
          PATIENT_APP_SERVER_NAME="$PATIENT_APP_SERVER_NAME" \
          bash scripts/render_nginx_conf.sh

      - name: Build deploy image on GitHub runner
        env:
          DART_DEFINE_FILE: ${{ needs.prepare.outputs.dart_define_file }}
          PATIENT_APP_IMAGE: patient-app:${{ github.sha }}
        run: |
          docker build \
            --pull \
            --build-arg ENV="${DART_DEFINE_FILE}" \
            --build-arg NGINX_FILE="generated/default_ec2.conf" \
            -t "${PATIENT_APP_IMAGE}" \
            .

          docker save "${PATIENT_APP_IMAGE}" | gzip > patient-app-image.tar.gz
          ls -lh patient-app-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: patient-app-image-${{ github.sha }}
          path: patient-app-image.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs:
      - prepare
      - build_image
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.github_environment }}
      url: ${{ vars.PATIENT_APP_URL }}
    concurrency:
      group: patient-app-ec2-${{ needs.prepare.outputs.github_environment }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: patient-app-image-${{ github.sha }}
          path: .

      - name: Verify image artifact
        run: |
          test -f patient-app-image.tar.gz
          ls -lh patient-app-image.tar.gz

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Trust target host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH reachability
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
        run: |
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${EC2_HOST}/22" 2>/dev/null; then
            echo "ERROR: GitHub runner cannot reach ${EC2_HOST}:22" >&2
            echo "HINT: allow inbound TCP 22 from GitHub runner IPs (or use a self-hosted runner / SSM)." >&2
            exit 1
          fi

      - name: Upload deploy image bundle to EC2
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
        run: |
          for attempt in 1 2 3; do
            echo "INFO: image upload attempt ${attempt}/3"
            if timeout 30m scp -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
              patient-app-image.tar.gz "${EC2_USER}@${EC2_HOST}:/tmp/patient-app-image.tar.gz"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: failed to upload image bundle after 3 attempts." >&2
              exit 1
            fi

            sleep 10
          done

      - name: Deploy on EC2
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          TARGET_ENV: ${{ needs.prepare.outputs.github_environment }}
          DART_DEFINE_FILE: ${{ needs.prepare.outputs.dart_define_file }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
          PATIENT_APP_DOMAIN: ${{ vars.PATIENT_APP_DOMAIN }}
          PATIENT_APP_TLS_DOMAIN: ${{ vars.PATIENT_APP_TLS_DOMAIN }}
          PATIENT_APP_SERVER_NAME: ${{ vars.PATIENT_APP_SERVER_NAME }}
          PATIENT_APP_IMAGE: patient-app:${{ github.sha }}
        run: |
          # Run one small server-side deploy script instead of embedding long SSH logic here.
          for attempt in 1 2 3; do
            echo "INFO: remote deploy attempt ${attempt}/3"
            if timeout 45m ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "${EC2_USER}@${EC2_HOST}" \
              "export TARGET_BRANCH='${TARGET_BRANCH}' \
               PATIENT_APP_ENV='${TARGET_ENV}' \
               PATIENT_APP_ENV_FILE='${DART_DEFINE_FILE}' \
               PATIENT_APP_DOMAIN='${PATIENT_APP_DOMAIN}' \
               PATIENT_APP_TLS_DOMAIN='${PATIENT_APP_TLS_DOMAIN}' \
               PATIENT_APP_SERVER_NAME='${PATIENT_APP_SERVER_NAME}' \
               PATIENT_APP_APP_DIR='${EC2_APP_DIR}' \
               PATIENT_APP_IMAGE='${PATIENT_APP_IMAGE}' \
               PATIENT_APP_IMAGE_TAR='/tmp/patient-app-image.tar.gz' \
               PATIENT_APP_COMPOSE_FILE='docker-compose-gha.yaml'; bash -s" < scripts/deploy_ec2.sh; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: failed to connect and deploy after 3 attempts." >&2
              exit 1
            fi

            sleep 10
          done

      - name: Smoke test
        run: |
          # Do not ignore TLS errors here. If the cert or DNS is wrong, fail fast.
          curl --retry 6 --retry-connrefused --retry-delay 10 -fsSLI "${{ vars.PATIENT_APP_URL }}"
